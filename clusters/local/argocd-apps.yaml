apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/nathbalica/kagent-lab
    targetRevision: main
    path: apps/kagent

  destination:
    server: https://kubernetes.default.svc
    namespace: kagent

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
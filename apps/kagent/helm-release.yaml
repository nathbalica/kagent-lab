apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent-chart
  namespace: argocd

spec:
  project: default

  source:
    repoURL: oci://ghcr.io/kagent-dev/kagent/helm
    chart: kagent
    targetRevision: 0.8.0-beta6
    helm: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: kagent

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

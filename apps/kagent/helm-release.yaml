apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent-chart
  namespace: argocd

spec:
  project: default

  source:
    path: charts/kagent
    repoURL: https://github.com/nathbalica/kagent-lab
    targetRevision: main
    helm: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: kagent

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
